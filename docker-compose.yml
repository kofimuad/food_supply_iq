# Local development infrastructure for FoodSupply IQ.
# Mirrors the Railway production services: Postgres+PostGIS and Redis.
# Usage: docker compose up -d   (or: pnpm infra:up)

services:
  db:
    # IMPORTANT: PostGIS image — mirrors the Railway PostGIS template (postgis/postgis:17-3.5).
    # The plain postgres image does NOT ship the postgis extension.
    image: postgis/postgis:17-3.5
    container_name: fsiq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fsiq
      POSTGRES_PASSWORD: fsiq
      POSTGRES_DB: fsiq
    ports:
      # Host 5440 to avoid clashing with a native Windows PostgreSQL on 5432.
      - "5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fsiq -d fsiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fsiq-redis
    restart: unless-stopped
    ports:
      # Host 6380 to avoid clashing with the sister AFDP project's Redis on 6379.
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for visit photos (Epic 3, Story 3.3).
  # Prod uses Cloudflare R2 or Railway-MinIO; the app talks plain S3 either way.
  minio:
    image: minio/minio
    container_name: fsiq-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
  miniodata:
