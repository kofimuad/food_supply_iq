[project]
name = "fsiq-api"
version = "0.1.0"
description = "FoodSupply IQ — FastAPI backend (accounts, visits, samples, orders, geo)"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30.0",
    "geoalchemy2>=0.16.0",
    "alembic>=1.14.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "arq>=0.26.0",
    "redis>=5.2.0",
    "pyjwt>=2.10.0",
    "argon2-cffi>=23.1.0",
    "email-validator>=2.2.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.8.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["app"]
# Alembic migration bodies are autogenerated; don't lint their formatting.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection defaults are idiomatic, not B008 bugs.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Security",
    "fastapi.File",
    "fastapi.Form",
    "fastapi.Header",
    "fastapi.Cookie",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
# One shared event loop for the whole session so the async DB engine's pooled
# asyncpg connections stay valid across tests (they're pinned to their loop).
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]

[tool.setuptools.packages.find]
include = ["app*"]
